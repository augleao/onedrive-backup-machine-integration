name: HACS Validation

on:
  push:
    branches:
      - main
  pull_request:
  workflow_dispatch:

jobs:
  hacs:
    runs-on: ubuntu-latest
    env:
      FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true
    steps:
      - name: Checkout
        uses: actions/checkout@v5

      - name: HACS Validation
        uses: hacs/action@main
        with:
          category: integration
